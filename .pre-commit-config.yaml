# Pre-commit hooks for yegor-blog (Hugo / Markdown / TOML)
# Install: pre-commit install
# Run manually: pre-commit run --all-files

default_stages: [pre-commit]

repos:
  # ── Secrets & security ───────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks (secrets scan)
        language: system
        entry: gitleaks protect --staged --redact --log-level warn
        pass_filenames: false

  # ── General file hygiene ─────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=2048"]  # 2 MB — Hugo images OK; large media should go to CDN
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: "^public/"
      - id: trailing-whitespace
        exclude: "^public/"
      - id: check-json
      - id: check-yaml
      - id: check-toml

  # ── Markdown quality ─────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args:
          - "--disable"
          - "MD013"   # line-length — Hugo content can have long lines
          - "MD033"   # inline HTML — Hugo shortcodes often embed HTML
          - "--"
        types: [markdown]
        exclude: "^themes/"
