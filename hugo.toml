baseURL = "https://5queezer.github.io/yegor-blog/"
theme = "PaperMod"
defaultContentLanguage = "en"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[params]
  author = "Christian Pojoni"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowRelatedPosts = true
  comments = true

  [params.cover]
    linkFullImages = true
    responsiveImages = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content"]

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/5queezer"

[[params.socialIcons]]
  name = "rss"
  url = "/yegor-blog/index.xml"

[taxonomies]
  tag = "tags"
  category = "categories"

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    title = "Yegor Digest"
    [languages.en.params.homeInfoParams]
      Title = "Yegor Digest"
      Content = "Summaries and key insights from Yegor Bugayenko's YouTube channel, translated from Russian and distilled for engineers who love good takes."

  [languages.de]
    languageName = "Deutsch"
    weight = 2
    title = "Yegor Digest"
    [languages.de.params.homeInfoParams]
      Title = "Yegor Digest"
      Content = "Zusammenfassungen und Erkenntnisse aus Yegor Bugayenkos YouTube-Kanal, aus dem Russischen übersetzt."

  [languages.es]
    languageName = "Español"
    weight = 3
    title = "Yegor Digest"
    [languages.es.params.homeInfoParams]
      Title = "Yegor Digest"
      Content = "Resúmenes e ideas del canal de YouTube de Yegor Bugayenko, traducidos del ruso para ingenieros con buen gusto."

  [languages.ru]
    languageName = "Русский"
    weight = 4
    title = "Yegor Digest"
    [languages.ru.params.homeInfoParams]
      Title = "Yegor Digest"
      Content = "Краткое изложение видео Егора Бугаенко — на языке оригинала."
